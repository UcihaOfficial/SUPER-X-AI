<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUPER X AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="UcihaOfficial/assets/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-blur blur-1"></div>
<div class="bg-blur blur-2"></div>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-icon">✦</div>

            <div>
                <h2>SUPER X AI</h2>
                <span>AI Assistant</span>
            </div>

        </div>

        <button
            class="new-chat-btn"
            onclick="newChat()">

            + New Chat

        </button>

        <div id="history" class="history"></div>

        <div class="sidebar-footer">

            <div class="user-card">

                <div class="avatar">
                    U
                </div>

                <div>
                    <h4>User</h4>
                    <span>Free Plan</span>
                </div>

            </div>

        </div>

    </aside>

    <main class="main">

        <header class="topbar">

            <div>
                <h3>SUPER X AI</h3>
                <p>Powered by Uciha/Putzz</p>
            </div>

            <button
                class="clear-btn"
                onclick="newChat()">

                Clear Chat

            </button>

        </header>

        <section id="chat" class="chat">

            <div class="welcome">

                <div class="welcome-icon">
                    ✦
                </div>

                <h1>
                    Welcome to SUPER X AI
                </h1>

                <p>
                    Ask anything. Generate ideas,
                    code, articles and more.
                </p>

                <div class="suggestions">

                    <button onclick="quickPrompt('Buat website modern')">
                        Website Modern
                    </button>

                    <button onclick="quickPrompt('Buat aplikasi Android')">
                        Android App
                    </button>

                    <button onclick="quickPrompt('Jelaskan JavaScript')">
                        Learn JS
                    </button>

                    <button onclick="quickPrompt('Buat logo AI futuristik')">
                        Design Idea
                    </button>

                </div>

            </div>

        </section>

        <div class="input-wrapper">

            <div class="input-box">

                <textarea
                    id="message"
                    rows="1"
                    placeholder="Message SUPER X AI..."
                ></textarea>

                <button
                    id="sendBtn"
                    class="send-btn"
                    onclick="sendMessage()">

                    ➜

                </button>

            </div>

            <small>
                SUPER X AI can make mistakes.
            </small>

        </div>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
